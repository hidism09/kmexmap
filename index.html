<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=6.0, user-scalable=yes, viewport-fit=cover">
    <title>2026 K-MEX 모바일 부스배치도</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f6f8; 
        }

        .image-container {
            position: relative; 
            display: block;
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto;
        }
        .image-container img {
            width: 100%;
            height: auto;
            display: block; 
        }

        /* 터치 영역 (부스) */
        .touch-overlay {
            position: absolute;
            box-sizing: border-box;
            background-color: transparent; 
            border: 2px solid transparent; 
            z-index: 10;
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* 부스 터치 시 빨간 테두리 */
        .touch-overlay.active {
            background-color: rgba(255, 0, 0, 0.3);
            border: 2px solid red;
            border-radius: 4px;
        }

        /* 말풍선 팝업 */
        .tooltip-popup {
            display: none;
            position: absolute; 
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #004b87;
            padding: 15px 25px; 
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
            width: max-content;
            max-width: 250px;
            text-align: center;
        }

        .tooltip-popup::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #004b87 transparent transparent transparent;
        }

        .tooltip-popup.flipped::after {
            top: -12px;
            bottom: auto;
            border-width: 0 10px 10px;
            border-color: transparent transparent #004b87 transparent;
        }

        .close-x {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
        }

        #popupTitle { margin: 5px 0 8px 0; color: #333; font-size: 17px; font-weight: 900; }
        #popupCompany { color: #0056b3; font-size: 14px; margin: 0 0 5px 0; word-break: keep-all; }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overscroll-behavior: none;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #111827;
            overflow: hidden;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            min-height: 100vh;
            background: #f4f6f8;
        }

        .search-panel {
            position: relative;
            z-index: 200;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            padding: calc(10px + env(safe-area-inset-top)) 10px 10px;
            background: rgba(255, 255, 255, 0.96);
            border-bottom: 1px solid rgba(17, 24, 39, 0.12);
            box-shadow: 0 2px 14px rgba(17, 24, 39, 0.08);
        }

        .search-wrap {
            position: relative;
            min-width: 0;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        #boothSearch {
            width: 100%;
            min-height: 44px;
            padding: 10px 42px 10px 14px;
            border: 1px solid #c9d2dc;
            border-radius: 8px;
            background: #fff;
            color: #111827;
            font-size: 16px;
            outline: none;
        }

        #boothSearch:focus {
            border-color: #0f62fe;
            box-shadow: 0 0 0 3px rgba(15, 98, 254, 0.16);
        }

        #clearSearch {
            position: absolute;
            top: 50%;
            right: 6px;
            width: 34px;
            height: 34px;
            border: 0;
            border-radius: 50%;
            background: transparent;
            color: #4b5563;
            font-size: 18px;
            font-weight: 800;
            transform: translateY(-50%);
            cursor: pointer;
        }

        #clearSearch:disabled {
            opacity: 0;
            pointer-events: none;
        }

        .zoom-controls {
            display: grid;
            grid-auto-flow: column;
            gap: 6px;
            min-width: 0;
        }

        .zoom-controls button {
            width: 44px;
            min-width: 44px;
            height: 44px;
            border: 1px solid #c9d2dc;
            border-radius: 8px;
            background: #fff;
            color: #111827;
            font-size: 18px;
            font-weight: 800;
            line-height: 1;
            cursor: pointer;
        }

        .zoom-controls button:active,
        #clearSearch:active {
            background: #edf2f7;
        }

        .search-results {
            position: absolute;
            top: calc(100% - 6px);
            left: 10px;
            right: 10px;
            display: none;
            max-height: min(48dvh, 360px);
            overflow: auto;
            padding: 6px;
            border: 1px solid rgba(17, 24, 39, 0.14);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 14px 30px rgba(17, 24, 39, 0.18);
        }

        .search-results.is-open {
            display: grid;
            gap: 4px;
        }

        .result-item {
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr);
            gap: 10px;
            width: 100%;
            min-height: 44px;
            padding: 8px 10px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: inherit;
            text-align: left;
            cursor: pointer;
        }

        .result-item:active,
        .result-item:focus {
            background: #eef5ff;
            outline: none;
        }

        .result-booth {
            align-self: center;
            color: #0f3d73;
            font-weight: 900;
            white-space: nowrap;
        }

        .result-company {
            min-width: 0;
            color: #374151;
            font-size: 14px;
            line-height: 1.35;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        .no-results {
            padding: 14px 12px;
            color: #6b7280;
            font-size: 14px;
            text-align: center;
        }

        .map-shell {
            position: relative;
            flex: 1;
            min-height: 0;
            padding-bottom: env(safe-area-inset-bottom);
            overflow: hidden;
        }

        .zoom-stage {
            position: absolute;
            inset: 0;
            overflow: hidden;
            touch-action: none;
            background: #eef1f4;
            cursor: grab;
            user-select: none;
        }

        .zoom-stage.is-dragging {
            cursor: grabbing;
        }

        .image-container {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            width: 100%;
            max-width: none;
            margin: 0;
            transform-origin: 0 0;
            will-change: transform;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            -webkit-user-drag: none;
            user-select: none;
            pointer-events: none;
        }

        .touch-overlay {
            border: 2px solid transparent;
            border-radius: 6px;
            padding: 0;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

        .touch-overlay.active {
            background: rgba(255, 69, 58, 0.22);
            border-color: #ff453a;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.86), 0 0 18px rgba(255, 69, 58, 0.55);
        }

        .tooltip-popup {
            display: none;
            position: absolute;
            width: min(280px, calc(100vw - 28px));
            max-width: none;
            padding: 14px 18px 13px;
            border: 1px solid #0f62fe;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 14px 30px rgba(17, 24, 39, 0.22);
            text-align: left;
            z-index: 180;
            pointer-events: auto;
        }

        .tooltip-popup::after,
        .tooltip-popup.flipped::after {
            display: none;
        }

        .close-x {
            top: 6px;
            right: 8px;
            width: 30px;
            height: 30px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            color: #4b5563;
            line-height: 1;
        }

        .close-x:active {
            background: #edf2f7;
        }

        #popupTitle {
            margin: 2px 34px 6px 0;
            color: #111827;
            font-size: 18px;
            line-height: 1.2;
        }

        #popupCompany {
            margin: 0;
            color: #0f62fe;
            font-size: 14px;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        @media (max-width: 560px) {
            .search-panel {
                grid-template-columns: minmax(0, 1fr);
                gap: 7px;
                padding-left: 8px;
                padding-right: 8px;
                width: 100vw;
                max-width: 100vw;
                overflow: hidden;
            }

            .zoom-controls {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                width: calc(100vw - 16px);
                max-width: calc(100vw - 16px);
            }

            .zoom-controls button {
                width: auto;
                min-width: 0;
            }

            .search-results {
                left: 8px;
                right: 8px;
            }

            .result-item {
                grid-template-columns: 64px minmax(0, 1fr);
            }
        }
    </style>
</head>

<script>
(() => {
    const MIN_VISIBLE_SCALE = 0.28;
    const MAX_SCALE = 6;
    const TAP_DISTANCE = 8;
    const SEARCH_LIMIT = 40;
    const MOBILE_VERTICAL_PAN_RATIO = 0.32;

    const state = {
        x: 0,
        y: 0,
        scale: 1,
        minScale: MIN_VISIBLE_SCALE,
        naturalWidth: 0,
        naturalHeight: 0
    };

    let stage;
    let container;
    let img;
    let popup;
    let searchInput;
    let clearButton;
    let resultsBox;
    let activeRecords = [];
    let records = [];
    let groupedRecords = [];
    let pointers = new Map();
    let gesture = null;
    let tapStart = null;

    window.addEventListener('load', init);

    function init() {
        stage = document.getElementById('zoomStage');
        container = document.getElementById('mapContainer');
        img = document.getElementById('boothMap');
        popup = document.getElementById('boothPopup');
        searchInput = document.getElementById('boothSearch');
        clearButton = document.getElementById('clearSearch');
        resultsBox = document.getElementById('searchResults');

        stage.appendChild(popup);
        state.naturalWidth = img.naturalWidth;
        state.naturalHeight = img.naturalHeight;

        if (!state.naturalWidth || !state.naturalHeight) {
            return;
        }

        buildOverlays();
        setupGestures();
        setupSearch();
        setupControls();
        sizeMap();
        resetView();

        window.addEventListener('resize', () => {
            const center = getStageCenter();
            const contentPoint = screenToContent(center);
            sizeMap();
            setScaleAround(state.scale, contentPoint, center);
            clampView();
            applyTransform();
            positionPopup();
        });
    }

    function buildOverlays() {
        const areas = Array.from(document.querySelectorAll('#dataMap area'));

        records = areas.map((area, index) => {
            const coords = area.getAttribute('coords').split(',').map(Number);
            const rect = getRect(coords);
            const popupData = parsePopupData(area);
            const groupKey = `${normalizeText(popupData.title)}|${normalizeText(popupData.company)}`;

            const overlay = document.createElement('button');
            overlay.type = 'button';
            overlay.className = 'touch-overlay';
            overlay.dataset.recordIndex = String(index);
            overlay.setAttribute('aria-label', `${popupData.title} ${popupData.company}`);
            overlay.style.left = `${(rect.left / state.naturalWidth) * 100}%`;
            overlay.style.top = `${(rect.top / state.naturalHeight) * 100}%`;
            overlay.style.width = `${(rect.width / state.naturalWidth) * 100}%`;
            overlay.style.height = `${(rect.height / state.naturalHeight) * 100}%`;

            container.appendChild(overlay);

            return {
                index,
                title: popupData.title,
                company: popupData.company,
                alt: area.getAttribute('alt') || '',
                rect,
                groupKey,
                overlay
            };
        });

        const byGroup = new Map();
        records.forEach((record) => {
            if (!byGroup.has(record.groupKey)) {
                byGroup.set(record.groupKey, {
                    ...record,
                    related: []
                });
            }
            byGroup.get(record.groupKey).related.push(record);
        });
        groupedRecords = Array.from(byGroup.values());
    }

    function parsePopupData(area) {
        const raw = area.getAttribute('onclick') || '';
        const match = raw.match(/openPopup\(\s*'([^']*)'\s*,\s*'([^']*)'\s*\)/);

        return {
            title: cleanText(match ? match[1] : (area.getAttribute('title') || area.getAttribute('alt') || '')),
            company: cleanText(match ? match[2] : '')
        };
    }

    function getRect(coords) {
        const xs = [];
        const ys = [];

        for (let i = 0; i < coords.length; i += 2) {
            xs.push(coords[i]);
            ys.push(coords[i + 1]);
        }

        const left = Math.min(...xs);
        const right = Math.max(...xs);
        const top = Math.min(...ys);
        const bottom = Math.max(...ys);

        return {
            left,
            top,
            width: right - left,
            height: bottom - top,
            centerX: left + ((right - left) / 2),
            centerY: top + ((bottom - top) / 2)
        };
    }

    function setupGestures() {
        stage.addEventListener('pointerdown', onPointerDown);
        stage.addEventListener('pointermove', onPointerMove);
        stage.addEventListener('pointerup', onPointerEnd);
        stage.addEventListener('pointercancel', onPointerEnd);
        stage.addEventListener('wheel', onWheel, { passive: false });
    }

    function onPointerDown(event) {
        if (event.pointerType === 'mouse' && event.button !== 0) {
            return;
        }

        if (event.target.closest('.tooltip-popup')) {
            return;
        }

        event.preventDefault();
        stage.classList.add('is-dragging');
        stage.setPointerCapture(event.pointerId);

        const point = getPoint(event);
        pointers.set(event.pointerId, point);
        tapStart = {
            x: point.x,
            y: point.y,
            target: event.target.closest('.touch-overlay'),
            moved: false
        };

        if (pointers.size === 1) {
            gesture = {
                type: 'pan',
                startX: state.x,
                startY: state.y,
                point
            };
        }

        if (pointers.size === 2) {
            const pair = Array.from(pointers.values());
            const center = getCenter(pair[0], pair[1]);
            gesture = {
                type: 'pinch',
                distance: getDistance(pair[0], pair[1]),
                scale: state.scale,
                contentPoint: screenToContent(center),
                center
            };
        }
    }

    function onPointerMove(event) {
        if (!pointers.has(event.pointerId)) {
            return;
        }

        event.preventDefault();
        const point = getPoint(event);
        pointers.set(event.pointerId, point);

        if (tapStart && getDistance(tapStart, point) > TAP_DISTANCE) {
            tapStart.moved = true;
        }

        if (pointers.size === 1 && gesture && gesture.type === 'pan') {
            state.x = gesture.startX + point.x - gesture.point.x;
            state.y = gesture.startY + point.y - gesture.point.y;
            clampView();
            applyTransform();
            positionPopup();
        }

        if (pointers.size >= 2) {
            const pair = Array.from(pointers.values()).slice(0, 2);
            const center = getCenter(pair[0], pair[1]);
            const distance = getDistance(pair[0], pair[1]);

            if (!gesture || gesture.type !== 'pinch') {
                gesture = {
                    type: 'pinch',
                    distance,
                    scale: state.scale,
                    contentPoint: screenToContent(center),
                    center
                };
            }

            const nextScale = clamp(gesture.scale * (distance / gesture.distance), state.minScale, MAX_SCALE);
            setScaleAround(nextScale, gesture.contentPoint, center);
            clampView();
            applyTransform();
            positionPopup();
        }
    }

    function onPointerEnd(event) {
        if (pointers.has(event.pointerId)) {
            pointers.delete(event.pointerId);
        }

        if (stage.hasPointerCapture(event.pointerId)) {
            stage.releasePointerCapture(event.pointerId);
        }

        if (pointers.size === 0) {
            stage.classList.remove('is-dragging');

            if (tapStart && !tapStart.moved && tapStart.target) {
                const record = records[Number(tapStart.target.dataset.recordIndex)];
                if (record) {
                    selectRecord(record, { focus: false });
                }
            }

            gesture = null;
            tapStart = null;
            return;
        }

        if (pointers.size === 1) {
            const point = Array.from(pointers.values())[0];
            gesture = {
                type: 'pan',
                startX: state.x,
                startY: state.y,
                point
            };
        }
    }

    function onWheel(event) {
        event.preventDefault();
        const point = getPoint(event);
        const nextScale = state.scale * (event.deltaY > 0 ? 0.9 : 1.1);
        setScaleAround(clamp(nextScale, state.minScale, MAX_SCALE), screenToContent(point), point);
        clampView();
        applyTransform();
        positionPopup();
    }

    function setupSearch() {
        searchInput.addEventListener('input', () => {
            clearButton.disabled = searchInput.value.length === 0;
            renderSearchResults(searchInput.value);
        });

        searchInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                const first = getMatches(searchInput.value)[0];
                if (first) {
                    selectRecord(first, { focus: true });
                    closeResults();
                    searchInput.blur();
                }
            }

            if (event.key === 'Escape') {
                closeResults();
                searchInput.blur();
            }
        });

        clearButton.addEventListener('click', () => {
            searchInput.value = '';
            clearButton.disabled = true;
            closeResults();
            searchInput.focus();
        });

        document.addEventListener('click', (event) => {
            if (!event.target.closest('.search-panel')) {
                closeResults();
            }
        });
    }

    function setupControls() {
        document.getElementById('zoomIn').addEventListener('click', () => zoomBy(1.25));
        document.getElementById('zoomOut').addEventListener('click', () => zoomBy(0.8));
        document.getElementById('resetZoom').addEventListener('click', resetView);
    }

    function renderSearchResults(query) {
        resultsBox.replaceChildren();
        const matches = getMatches(query).slice(0, SEARCH_LIMIT);

        if (!query.trim()) {
            closeResults();
            return;
        }

        if (matches.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'no-results';
            empty.textContent = '검색 결과가 없습니다';
            resultsBox.appendChild(empty);
            resultsBox.classList.add('is-open');
            return;
        }

        matches.forEach((record) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'result-item';
            button.setAttribute('role', 'option');

            const booth = document.createElement('span');
            booth.className = 'result-booth';
            booth.textContent = record.title;

            const company = document.createElement('span');
            company.className = 'result-company';
            company.textContent = record.company || record.alt;

            button.append(booth, company);
            button.addEventListener('click', () => {
                selectRecord(record, { focus: true });
                closeResults();
                searchInput.blur();
            });

            resultsBox.appendChild(button);
        });

        resultsBox.classList.add('is-open');
    }

    function getMatches(query) {
        const normalized = normalizeText(query);

        if (!normalized) {
            return [];
        }

        return groupedRecords.filter((record) => {
            return normalizeText(record.title).includes(normalized) ||
                normalizeText(record.company).includes(normalized) ||
                normalizeText(record.alt).includes(normalized);
        });
    }

    function closeResults() {
        resultsBox.classList.remove('is-open');
    }

    function selectRecord(record, options = {}) {
        const group = groupedRecords.find((item) => item.groupKey === record.groupKey) || record;
        activeRecords.forEach((item) => item.overlay.classList.remove('active'));
        activeRecords = group.related || [record];
        activeRecords.forEach((item) => item.overlay.classList.add('active'));

        openPopup(record.title, record.company);

        if (options.focus) {
            focusRecord(record);
        }

        positionPopup(record);
    }

    function focusRecord(record) {
        const layer = getLayerSize();
        const stageRect = stage.getBoundingClientRect();
        const contentX = (record.rect.centerX / state.naturalWidth) * layer.width;
        const contentY = (record.rect.centerY / state.naturalHeight) * layer.height;
        const targetScale = clamp(Math.max(1.65, state.scale), state.minScale, MAX_SCALE);

        state.scale = targetScale;
        state.x = (stageRect.width / 2) - (contentX * state.scale);
        state.y = (stageRect.height / 2) - (contentY * state.scale);
        clampView();
        applyTransform();
    }

    function openPopup(title, subtitle) {
        document.getElementById('popupTitle').innerText = title;
        document.getElementById('popupCompany').innerText = subtitle;
        popup.style.display = 'block';
    }

    function closePopup() {
        popup.style.display = 'none';
        activeRecords.forEach((record) => record.overlay.classList.remove('active'));
        activeRecords = [];
    }

    function positionPopup(record = activeRecords[0]) {
        if (!record || popup.style.display === 'none') {
            return;
        }

        const layer = getLayerSize();
        const stageRect = stage.getBoundingClientRect();
        const margin = 10;
        const contentX = (record.rect.centerX / state.naturalWidth) * layer.width;
        const contentTop = (record.rect.top / state.naturalHeight) * layer.height;
        const contentBottom = ((record.rect.top + record.rect.height) / state.naturalHeight) * layer.height;
        const screenX = state.x + (contentX * state.scale);
        const screenTop = state.y + (contentTop * state.scale);
        const screenBottom = state.y + (contentBottom * state.scale);

        popup.style.left = `${stageRect.width / 2}px`;
        popup.style.top = `${stageRect.height / 2}px`;
        popup.style.transform = 'translate(-50%, -50%)';

        const popupRect = popup.getBoundingClientRect();
        const halfWidth = popupRect.width / 2;
        const nextLeft = clamp(screenX, margin + halfWidth, stageRect.width - margin - halfWidth);
        const canPlaceAbove = screenTop - popupRect.height - 12 > margin;
        const nextTop = canPlaceAbove
            ? Math.max(margin, screenTop - 12)
            : Math.min(stageRect.height - margin - popupRect.height, screenBottom + 12);

        popup.style.left = `${nextLeft}px`;
        popup.style.top = `${Math.max(margin, nextTop)}px`;
        popup.style.transform = canPlaceAbove ? 'translate(-50%, -100%)' : 'translate(-50%, 0)';
    }

    function sizeMap() {
        const stageRect = stage.getBoundingClientRect();
        const aspect = state.naturalWidth / state.naturalHeight;
        const fitHeightWidth = stageRect.height * aspect;
        const baseWidth = window.matchMedia('(max-width: 700px)').matches
            ? Math.max(stageRect.width, fitHeightWidth)
            : Math.max(stageRect.width, Math.min(fitHeightWidth, state.naturalWidth));

        container.style.width = `${baseWidth}px`;
        state.minScale = Math.max(MIN_VISIBLE_SCALE, Math.min(stageRect.width / baseWidth, stageRect.height / (baseWidth / aspect)));
    }

    function resetView() {
        const layer = getLayerSize();
        const stageRect = stage.getBoundingClientRect();

        state.scale = window.matchMedia('(max-width: 700px)').matches ? 1 : Math.max(state.minScale, Math.min(1, stageRect.width / layer.width));
        state.x = (stageRect.width - (layer.width * state.scale)) / 2;
        state.y = (stageRect.height - (layer.height * state.scale)) / 2;
        clampView();
        applyTransform();
        positionPopup();
    }

    function zoomBy(multiplier) {
        const center = getStageCenter();
        setScaleAround(clamp(state.scale * multiplier, state.minScale, MAX_SCALE), screenToContent(center), center);
        clampView();
        applyTransform();
        positionPopup();
    }

    function setScaleAround(nextScale, contentPoint, screenPoint) {
        state.scale = nextScale;
        state.x = screenPoint.x - (contentPoint.x * state.scale);
        state.y = screenPoint.y - (contentPoint.y * state.scale);
    }

    function screenToContent(point) {
        return {
            x: (point.x - state.x) / state.scale,
            y: (point.y - state.y) / state.scale
        };
    }

    function getStageCenter() {
        const rect = stage.getBoundingClientRect();
        return {
            x: rect.width / 2,
            y: rect.height / 2
        };
    }

    function getLayerSize() {
        return {
            width: container.offsetWidth,
            height: container.offsetHeight
        };
    }

    function clampView() {
        const layer = getLayerSize();
        const stageRect = stage.getBoundingClientRect();
        const width = layer.width * state.scale;
        const height = layer.height * state.scale;
        const verticalPanPadding = getVerticalPanPadding(stageRect.height);

        state.x = width <= stageRect.width
            ? (stageRect.width - width) / 2
            : clamp(state.x, stageRect.width - width, 0);

        state.y = clamp(
            state.y,
            stageRect.height - height - verticalPanPadding,
            verticalPanPadding
        );
    }

    function getVerticalPanPadding(stageHeight) {
        if (!window.matchMedia('(max-width: 700px)').matches) {
            return 0;
        }

        return Math.round(stageHeight * MOBILE_VERTICAL_PAN_RATIO);
    }

    function applyTransform() {
        container.style.transform = `translate3d(${state.x}px, ${state.y}px, 0) scale(${state.scale})`;
    }

    function getPoint(event) {
        const rect = stage.getBoundingClientRect();
        return {
            x: event.clientX - rect.left,
            y: event.clientY - rect.top
        };
    }

    function getCenter(a, b) {
        return {
            x: (a.x + b.x) / 2,
            y: (a.y + b.y) / 2
        };
    }

    function getDistance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
    }

    function cleanText(value) {
        return (value || '').replace(/\s+/g, ' ').trim();
    }

    function normalizeText(value) {
        return cleanText(value)
            .toLocaleLowerCase('ko-KR')
            .replace(/[\s_-]+/g, '');
    }

    window.openPopup = openPopup;
    window.closePopup = closePopup;
})();
</script>
