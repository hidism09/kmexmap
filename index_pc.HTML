    <style>
        /* 팝업창 기본 스타일 */
        #boothPopup {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            z-index: 9999; 
            min-width: 300px; 
            text-align: center;
        }
        .close-btn {
            margin-top: 20px; 
            padding: 10px 20px; 
            background: #004b87; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer;
        }
        
        /* 이미지 영역 */
        .image-container {
            position: relative; 
            display: block;
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto;
        }
        .image-container img {
            width: 100%;
            height: auto;
            display: block; 
        }

        /* 🔴 마우스 올렸을 때 나타나는 빨간 네모 */
        .hover-overlay {
            position: absolute;
            box-sizing: border-box;
            cursor: pointer;
            background-color: transparent; 
            border: 2px solid transparent; 
            transition: background-color 0.2s, border 0.2s;
            z-index: 10;
        }
        .hover-overlay:hover {
            background-color: rgba(255, 0, 0, 0.3);
            border: 2px solid red;
        }
    </style>
</head>

<div id="boothPopup">
  <h2 id="popupTitle" style="margin-top: 0; color: #333;">부스명</h2>
  <h3 id="popupCompany" style="color: #0056b3;">세부 분류</h3>
  <p id="popupDesc" style="color: #666; line-height: 1.5;">여기에 상세 설명이 들어갑니다.</p>
  <button class="close-btn" onclick="closePopup()">닫기</button>
</div>

<script>
  window.addEventListener('load', function() {
      const img = document.getElementById('boothMap');
      const container = document.getElementById('mapContainer');
      const areas = document.querySelectorAll('#dataMap area');
      
      const originalWidth = img.naturalWidth;
      const originalHeight = img.naturalHeight;

      if(originalWidth === 0) return;

      areas.forEach(area => {
          const coords = area.getAttribute('coords').split(',').map(Number);
          
          let minX = coords[0], maxX = coords[0], minY = coords[1], maxY = coords[1];
          for(let i = 0; i < coords.length; i += 2) {
              if(coords[i] < minX) minX = coords[i];
              if(coords[i] > maxX) maxX = coords[i];
              if(coords[i+1] < minY) minY = coords[i+1];
              if(coords[i+1] > maxY) maxY = coords[i+1];
          }
          
          const leftPercent = (minX / originalWidth) * 100;
          const topPercent = (minY / originalHeight) * 100;
          const widthPercent = ((maxX - minX) / originalWidth) * 100;
          const heightPercent = ((maxY - minY) / originalHeight) * 100;

          const overlay = document.createElement('div');
          overlay.className = 'hover-overlay';
          overlay.style.left = leftPercent + '%';
          overlay.style.top = topPercent + '%';
          overlay.style.width = widthPercent + '%';
          overlay.style.height = heightPercent + '%';

          const clickFunction = area.getAttribute('onclick');
          if (clickFunction) {
              overlay.addEventListener('click', function(e) {
                  e.preventDefault();
                  new Function(clickFunction)(); 
              });
          }

          container.appendChild(overlay);
      });
  });

  function openPopup(areaId, subtitle, description) {
    document.getElementById('popupTitle').innerText = areaId;
    document.getElementById('popupCompany').innerText = subtitle;
    document.getElementById('popupDesc').innerText = description;
    document.getElementById('boothPopup').style.display = 'block';
  }

  function closePopup() {
    document.getElementById('boothPopup').style.display = 'none';
  }
</script>
